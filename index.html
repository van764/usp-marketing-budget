            padding: 0;
            box-sizing: border-box;
        }

        body {

            background-color: #F5F5F7;
            color: #1D1D1F;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(245, 245, 247, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #E5E5EA;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            background-color: #34C759;
            border-radius: 50%;
        }

        .nav-dot.syncing {
            background-color: #FF9500;
            animation: pulse 1s infinite;
        }

        .nav-dot.error {
            background-color: #FF3B30;
        }

        .nav-dot.offline {
            background-color: #8E8E93;
        }

        .nav-dot.loading {
            background-color: #007AFF;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #1D1D1F;
        }

        .nav-center {
            display: flex;
            gap: 4px;
            background: white;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            padding: 4px;
        }

        .nav-tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #8E8E93;
            transition: all 0.2s;
        }

        .nav-tab.active {
            background: #007AFF;
            color: white;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hint-text {
            font-size: 12px;
            color: #8E8E93;
        }

        .sync-status {
            font-size: 11px;
            color: #34C759;
            font-weight: 500;
        }

        .sync-status.error {
            color: #FF3B30;
        }

        .sync-status.syncing {
            color: #FF9500;
        }

        .sync-status.offline {
            color: #8E8E93;
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #1D1D1F;
        }

        .location-tabs {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #E5E5EA;

        .location-tab {

            border: 1px solid #E5E5EA;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #1D1D1F;

        .location-tab.active {

            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;

            left: 0;
            right: 0;

        // ── API Helpers ──
        async function fetchAPI(action) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                const r = await fetch(APPS_SCRIPT_URL + '?action=' + action, {
                    redirect: 'follow',
                    signal: controller.signal
                });
                clearTimeout(timeout);
                return await r.json();
            } catch (e) {
                console.error('API fetch error:', e);
                return null;
            }
        }

        async function postAPI(action, payload) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                const r = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action, ...payload }),
                    signal: controller.signal
                });
                clearTimeout(timeout);
                return await r.json();
            } catch (e) {
                console.error('API post error:', e);
                return null;
            }
        }

        function BudgetDashboard() {
            const [activeTab, setActiveTab] = useState('budget');
            const [selectedLocation, setSelectedLocation] = useState('LEVEL');
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [draggedRowIndex, setDraggedRowIndex] = useState(null);
            const [dropTarget, setDropTarget] = useState(null);
            const [googleSheetUrls, setGoogleSheetUrls] = useState({});
            const [dataSource, setDataSource] = useState('embedded');
            const [locationData, setLocationData] = useState(EMBEDDED_DATA);
            const [items, setItems] = useState(EMBEDDED_DATA['LEVEL'].items.map(i => ({ ...i })));
            const [syncStatus, setSyncStatus] = useState('loading');
            const selectedLocationRef = useRef('LEVEL');

            useEffect(() => {
                selectedLocationRef.current = selectedLocation;
            }, [selectedLocation]);

            // ── Load from Apps Script on mount ──
            useEffect(() => {
                loadFromBackend();
            }, []);

            async function loadFromBackend() {
                setSyncStatus('syncing');
                const data = await fetchAPI('getAll');
                if (!data || data.error) {
                    console.log('Backend unavailable, using embedded data');
                    setSyncStatus('offline');
                    return;
                }

                try {
                    const newLocationData = { ...EMBEDDED_DATA };

                    // Group line items by brand
                    if (data.lineItems && data.lineItems.length > 0) {
                        const byBrand = {};
                        LOCATIONS.forEach(loc => { byBrand[loc.toLowerCase()] = []; });

                        data.lineItems.forEach(item => {
                            const brand = (item.brand_id || '').toLowerCase();
                            if (byBrand[brand]) {
                                byBrand[brand].push(apiItemToReact(item));
                            }
                        });

                        Object.keys(byBrand).forEach(brand => {
                            byBrand[brand].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
                        });

                        LOCATIONS.forEach(loc => {
                            const brandKey = loc.toLowerCase();
                            if (byBrand[brandKey] && byBrand[brandKey].length > 0) {
                                newLocationData[loc] = { ...newLocationData[loc], items: byBrand[brandKey] };
                            }
                        });
                    }

                    // Load allocations
                    if (data.allocations && data.allocations.length > 0) {
                        data.allocations.forEach(alloc => {
                            const loc = (alloc.brand_id || '').toUpperCase();
                            if (newLocationData[loc]) {
                                newLocationData[loc] = {
                                    ...newLocationData[loc],
                                    allocations: MONTH_KEYS.map(k => parseInt(alloc[k]) || 0)
                                };
                            }
                        });
                    }

                    setLocationData(newLocationData);
                    const currentLoc = selectedLocationRef.current;
                    setItems(newLocationData[currentLoc].items.map(i => ({ ...i })));
                    setDataSource('backend');
                    setSyncStatus('synced');
                    console.log('Loaded from Apps Script backend');
                } catch (e) {
                    console.error('Error parsing backend data:', e);
                    setSyncStatus('offline');
                }
            }

            // Google Sheets CSV fallback
            useEffect(() => {
                if (googleSheetUrls[selectedLocation]) {
                    fetchGoogleSheetData(googleSheetUrls[selectedLocation], selectedLocation);
                    const interval = setInterval(() => {
                        fetchGoogleSheetData(googleSheetUrls[selectedLocation], selectedLocation);
                    }, 60000);
                    return () => clearInterval(interval);
                }
            }, [googleSheetUrls, selectedLocation]);

            const fetchGoogleSheetData = (url, location) => {
                Papa.parse(url, {
                    download: true, header: false, skipEmptyLines: true,
                    complete: (results) => { parseGoogleSheetData(results.data, location); },
                    error: () => console.log('Error loading sheet')
                });
            };

            const parseGoogleSheetData = (rows, location) => {
                if (rows.length < 4) return;
                const allocations = MONTHS.map((_, i) => parseInt(rows[0][8 + i]) || 0);
                const revenueTarget = parseInt(rows[1][1]) || 0;
                const newItems = [];
                for (let i = 3; i < rows.length; i++) {
                    const row = rows[i];
                    newItems.push({
                        vendor: row[0] || '', publisher: row[1] || '', campaign: row[2] || '',
                        media: row[3] || '', category: row[4] || 'ALL', status: row[5] || 'Active',
                        months: MONTHS.map((_, j) => parseInt(row[7 + j]) || 0)
                    });
                }
                setLocationData(prev => ({ ...prev, [location]: { allocations, revenue: revenueTarget, items: newItems } }));
                if (location === selectedLocation) setItems(newItems);
                setDataSource('google');
            };

            // Update items when location changes
            useEffect(() => {
                if (locationData[selectedLocation]) {
                    setItems(locationData[selectedLocation].items.map(i => ({ ...i })));
                }
            }, [selectedLocation, locationData]);

            const currentLocationData = locationData[selectedLocation];
            const allocation = currentLocationData.allocations[selectedMonth];
            const revenue = currentLocationData.revenue;
            const planned = items.reduce((sum, item) => sum + item.months[selectedMonth], 0);
            const remaining = allocation - planned;
            const trialItems = items.filter(item => item.status === 'Trial');
            const trialSpend = trialItems.reduce((sum, item) => sum + item.months[selectedMonth], 0);
            const annualTrialSpend = trialItems.reduce((sum, item) => sum + item.months.reduce((a, b) => a + b, 0), 0);

            // ── Backend save helpers ──
            const saveItem = async (item, field, value) => {
                if (!item.id) return;
                setSyncStatus('syncing');
                const result = await postAPI('updateLineItem', { id: item.id, field, value });
                setSyncStatus(result && !result.error ? 'synced' : 'error');
            };

            const handleStatusChange = (index, status) => {
                const newItems = [...items];
                newItems[index].status = status;
                setItems(newItems);
                saveItem(newItems[index], 'status', status);
            };

            const handleMonthEdit = (rowIndex, monthIndex, value) => {
                const newItems = [...items];
                newItems[rowIndex].months[monthIndex] = parseInt(value) || 0;
                setItems(newItems);
                saveItem(newItems[rowIndex], MONTH_KEYS[monthIndex], parseInt(value) || 0);
            };

            const handleDragStart = (index) => { setDraggedRowIndex(index); };
            const handleDragOver = (e, index) => { e.preventDefault(); setDropTarget(index); };

            const handleDrop = (e, targetIndex) => {
                e.preventDefault();
                if (draggedRowIndex !== null && draggedRowIndex !== targetIndex) {
                    const newItems = [...items];
                    const draggedItem = newItems[draggedRowIndex];
                    newItems.splice(draggedRowIndex, 1);
                    newItems.splice(targetIndex, 0, draggedItem);
                    setItems(newItems);
                    // Save new sort orders
                    newItems.forEach((item, idx) => {
                        if (item.id) {
                            postAPI('updateLineItem', { id: item.id, field: 'sort_order', value: idx });
                        }
                    });
                }
                setDraggedRowIndex(null);
                setDropTarget(null);
            };

            const addLineItem = async (newItem) => {
                const item = {
                    vendor: newItem.vendor || '', publisher: newItem.publisher || '',
                    campaign: newItem.campaign || '', media: newItem.media || '',
                    category: newItem.category || 'PROSPECT', status: newItem.status || 'Active',
                    months: new Array(12).fill(0)
                };
                setSyncStatus('syncing');
                const payload = {
                    brand_id: selectedLocation.toLowerCase(),
                    vendor: item.vendor, publisher: item.publisher,
                    campaign: item.campaign, category: item.category, status: item.status,
                    ...monthsToAPI(item.months)
                };
                const result = await postAPI('addLineItem', payload);
                if (result && result.id) { item.id = result.id; setSyncStatus('synced'); }
                else { setSyncStatus('error'); }
                setItems([...items, item]);
                setShowAddModal(false);
            };

            const deleteLineItem = async (index) => {
                const item = items[index];
                if (!confirm('Delete "' + (item.campaign || item.vendor) + '"?')) return;
                const newItems = [...items];
                newItems.splice(index, 1);
                setItems(newItems);
                if (item.id) {
                    setSyncStatus('syncing');
                    const result = await postAPI('deleteLineItem', { id: item.id });
                    setSyncStatus(result && !result.error ? 'synced' : 'error');
                }
            };

            const handleAllocationEdit = async (monthIndex, value) => {
                const newAllocations = [...currentLocationData.allocations];
                newAllocations[monthIndex] = parseInt(value) || 0;
                setLocationData(prev => ({
                    ...prev,
                    [selectedLocation]: { ...prev[selectedLocation], allocations: newAllocations }
                }));
                setSyncStatus('syncing');
                const result = await postAPI('updateAllocation', {
                    brand_id: selectedLocation.toLowerCase(),
                    field: MONTH_KEYS[monthIndex],
                    value: parseInt(value) || 0
                });
                setSyncStatus(result && !result.error ? 'synced' : 'error');
            };

            // Chart data
            const monthlyTrendData = MONTHS.map((month, idx) => ({
                month,
                planned: items.reduce((sum, item) => sum + item.months[idx], 0),
                allocation: currentLocationData.allocations[idx]
            }));

            const spendByCategory = {};
            items.forEach(item => {
                if (!spendByCategory[item.category]) spendByCategory[item.category] = 0;
                spendByCategory[item.category] += item.months[selectedMonth];
            });
            const categoryChartData = Object.entries(spendByCategory).map(([cat, val]) => ({ category: cat, spend: val }));

            const activeCount = items.filter(i => i.status === 'Active').length;
            const trialCount = items.filter(i => i.status === 'Trial').length;
            const unapprovedCount = items.filter(i => i.status === 'Unapproved').length;
            const endedCount = items.filter(i => i.status === 'Ended').length;

            const syncLabel = syncStatus === 'synced' ? 'Synced' : syncStatus === 'syncing' ? 'Saving...' : syncStatus === 'offline' ? 'Offline (local)' : syncStatus === 'error' ? 'Sync error' : 'Loading...';
            const dotClass = syncStatus === 'syncing' ? 'syncing' : syncStatus === 'error' ? 'error' : syncStatus === 'offline' ? 'offline' : syncStatus === 'loading' ? 'loading' : '';

            return (
                <div className="container">
                    {/* NAV */}
                    <div className="nav">
                        <div className="nav-left">
                            <div className={`nav-dot ${dotClass}`}></div>
                            <div className="nav-title">USP Budget 2026</div>
                            <span className={`sync-status ${syncStatus === 'error' || syncStatus === 'offline' ? 'error' : syncStatus === 'syncing' ? 'syncing' : ''}`}>{syncLabel}</span>
                        </div>
                        <div className="nav-center">
                            <button className={`nav-tab ${activeTab === 'budget' ? 'active' : ''}`} onClick={() => setActiveTab('budget')}>Budget</button>
                            <button className={`nav-tab ${activeTab === 'allocation' ? 'active' : ''}`} onClick={() => setActiveTab('allocation')}>Allocation</button>
                        </div>
                        <div className="nav-right">
                            <span className="hint-text">Double-click any cell to edit</span>
                            <button className="settings-btn" onClick={() => setShowSettingsModal(true)}>&#9881;</button>
                        </div>
                    </div>

                    {/* LOCATION TABS */}
                    <div className="location-tabs">
                        {LOCATIONS.map(loc => (
                            <button key={loc} className={`location-tab ${selectedLocation === loc ? 'active' : ''}`} onClick={() => setSelectedLocation(loc)}>{loc}</button>
                        ))}
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="content">
                        {activeTab === 'budget' && (
                            <>
                                <div className="kpi-row">
                                    <div className="kpi-card">
                                        <div className="kpi-label">{MONTHS[selectedMonth]} Allocated</div>
                                        <div className="kpi-value">${(allocation || 0).toLocaleString()}</div>
                                        <div className="kpi-subtitle">Approved by corporate</div>
                                    </div>
                                    <div className="kpi-card">
                                        <div className="kpi-label">Planned</div>
                                        <div className="kpi-value">${(planned || 0).toLocaleString()}</div>
                                        <div className="kpi-subtitle">vs previous month</div>
                                    </div>
                                    <div className={`kpi-card ${remaining >= 0 ? 'green' : 'red'}`}>
                                        <div className="kpi-label">Remaining</div>
                                        <div className={`kpi-value ${remaining >= 0 ? 'green' : 'red'}`}>${Math.abs(remaining || 0).toLocaleString()}</div>
                                        <div className="kpi-subtitle">${Math.abs(remaining || 0).toLocaleString()} {remaining >= 0 ? 'under' : 'over'} allocation</div>
                                    </div>
                                    <div className="kpi-card orange">
                                        <div className="kpi-label">Trial Spend</div>
                                        <div className="kpi-value orange">${(trialSpend || 0).toLocaleString()}</div>
                                        <div className="kpi-subtitle">${(annualTrialSpend || 0).toLocaleString()} annual / {trialCount} items</div>
                                    </div>
                                </div>

                                <div className="utilization-card">
                                    <div className="utilization-label">{MONTHS[selectedMonth]} Budget Utilization</div>
                                    <div className="utilization-row">
                                        <div className="utilization-left">{allocation ? Math.round((planned / allocation) * 100) : 0}% used</div>
                                        <div className="utilization-right">${planned.toLocaleString()} of ${allocation.toLocaleString()}</div>
                                    </div>
                                    <div className="utilization-bar-bg">
                                        <div className="utilization-bar-fill" style={{ width: `${allocation ? Math.min((planned / allocation) * 100, 100) : 0}%` }}></div>
                                    </div>
                                </div>

                                <div className="table-card">
                                    <div className="table-header">
                                        <div className="table-title">Budget Line Items - Full Year 2026</div>
                                        <button className="add-btn" onClick={() => setShowAddModal(true)}>+ Add Line Item</button>
                                    </div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style={{ width: '30px' }}></th>
                                                <th>Vendor / Campaign</th>
                                                <th>Cat</th>
                                                <th>Status</th>
                                                {MONTHS.map((month, idx) => (
                                                    <th key={month} style={{ background: idx === selectedMonth ? '#E5E5EA' : 'transparent' }}>{month}</th>
                                                ))}
                                                <th style={{ width: '30px' }}></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {items.map((item, idx) => (
                                                <tr key={item.id || idx} draggable onDragStart={() => handleDragStart(idx)} onDragOver={(e) => handleDragOver(e, idx)} onDrop={(e) => handleDrop(e, idx)} className={draggedRowIndex === idx ? 'dragging' : dropTarget === idx ? 'drag-over' : ''}>
                                                    <td className="drag-handle">&#9776;</td>
                                                    <td className="vendor-cell">
                                                        <div className="vendor-name">{item.vendor || '\u2014'}</div>
                                                        <div className="vendor-subtitle">{item.publisher || '\u2014'} &bull; {item.campaign}</div>
                                                    </td>
                                                    <td>
                                                        <div className="category-badge">
                                                            <div className="category-dot" style={{ backgroundColor: CATEGORIES[item.category] || '#8E8E93' }}></div>
                                                            {item.category}
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <div className={`status-pill ${item.status.toLowerCase()}`} onClick={(e) => {
                                                            e.stopPropagation();
                                                            const statuses = ['Active', 'Trial', 'Unapproved', 'Ended'];
                                                            const nextStatus = statuses[(statuses.indexOf(item.status) + 1) % statuses.length];
                                                            handleStatusChange(idx, nextStatus);
                                                        }}>
                                                            {item.status}
                                                        </div>
                                                    </td>
                                                    {item.months.map((value, monthIdx) => (
                                                        <td key={monthIdx} className={`month-cell ${monthIdx === selectedMonth ? 'current' : ''}`}
                                                            onDoubleClick={() => {
                                                                const input = prompt('Enter amount:', value || '');
                                                                if (input !== null) handleMonthEdit(idx, monthIdx, input);
                                                            }}>
                                                            {value ? `$${value.toLocaleString()}` : '\u2014'}
                                                        </td>
                                                    ))}
                                                    <td><button className="delete-btn" onClick={() => deleteLineItem(idx)} title="Delete">&times;</button></td>
                                                </tr>
                                            ))}
                                            <tr className="total-row">
                                                <td colSpan="4">TOTAL</td>
                                                {MONTHS.map((_, idx) => (
                                                    <td key={idx} className={`month-cell ${idx === selectedMonth ? 'current' : ''}`}>${items.reduce((sum, item) => sum + item.months[idx], 0).toLocaleString()}</td>
                                                ))}
                                                <td></td>
                                            </tr>
                                            <tr className="allocation-row">
                                                <td colSpan="4">ALLOCATION</td>
                                                {MONTHS.map((_, idx) => (
                                                    <td key={idx} className={`month-cell ${idx === selectedMonth ? 'current' : ''}`}>${currentLocationData.allocations[idx].toLocaleString()}</td>
                                                ))}
                                                <td></td>
                                            </tr>
                                            <tr className="variance-row">
                                                <td colSpan="4">VARIANCE</td>
                                                {MONTHS.map((_, idx) => {
                                                    const v = currentLocationData.allocations[idx] - items.reduce((sum, item) => sum + item.months[idx], 0);
                                                    return <td key={idx} className={`month-cell ${idx === selectedMonth ? 'current' : ''} ${v >= 0 ? 'variance-positive' : 'variance-negative'}`}>{v >= 0 ? '+' : ''}${v.toLocaleString()}</td>;
                                                })}
                                                <td></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <div className="status-summary">
                                        {items.length} items &middot; {activeCount} active &middot; {trialCount} trial &middot; {unapprovedCount} unapproved &middot; {endedCount} ended
                                    </div>
                                </div>

                                <div className="charts-row">
                                    <div className="chart-card">
                                        <div className="chart-title">Monthly Budget Trend</div>
                                        <ResponsiveContainer width="100%" height={300}>
                                            <BarChart data={monthlyTrendData}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#E5E5EA" />
                                                <XAxis dataKey="month" />
                                                <YAxis />
                                                <Tooltip />
                                                <Legend />
                                                <Bar dataKey="planned" fill="#007AFF" />
                                                <Bar dataKey="allocation" fill="#E5E5EA" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="chart-card">
                                        <div className="chart-title">Spend by Category - {MONTHS[selectedMonth]}</div>
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                            {categoryChartData.map(cat => (
                                                <div key={cat.category} style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                                    <div style={{ width: '80px', fontSize: '12px', fontWeight: '500' }}>{cat.category}</div>
                                                    <div style={{ flex: 1, height: '20px', background: '#E5E5EA', borderRadius: '4px', overflow: 'hidden' }}>
                                                        <div style={{ height: '100%', background: CATEGORIES[cat.category] || '#007AFF', width: `${Math.min((cat.spend / Math.max(...categoryChartData.map(c => c.spend), 1)) * 100, 100)}%` }}></div>
                                                    </div>
                                                    <div style={{ width: '60px', textAlign: 'right', fontSize: '12px', fontWeight: '500' }}>${cat.spend.toLocaleString()}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}

                        {activeTab === 'allocation' && (
                            <div className="table-card">
                                <div className="table-title" style={{ marginBottom: '20px' }}>Monthly Allocation - {selectedLocation}</div>
                                <table className="allocation-table">
                                    <thead><tr>{MONTHS.map(month => <th key={month}>{month}</th>)}</tr></thead>
                                    <tbody>
                                        <tr>
                                            {currentLocationData.allocations.map((alloc, idx) => (
                                                <td key={idx} style={{ textAlign: 'center' }}>
                                                    <input type="number" value={alloc} onChange={(e) => handleAllocationEdit(idx, e.target.value)} style={{ textAlign: 'center' }} />
                                                </td>
                                            ))}
                                        </tr>
                                    </tbody>
                                </table>
                                <div style={{ marginTop: '20px', fontSize: '14px', color: '#8E8E93' }}>
                                    <div>Total Annual: ${currentLocationData.allocations.reduce((a, b) => a + b, 0).toLocaleString()}</div>
                                    <div>Revenue Target: ${currentLocationData.revenue.toLocaleString()}</div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* SETTINGS MODAL */}
                    {showSettingsModal && (
                        <div className="modal-overlay" onClick={() => setShowSettingsModal(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-title">Data Source Settings</div>
                                <div className="settings-group">
                                    <div className="settings-group-title">Apps Script Backend</div>
                                    <div style={{ fontSize: '12px', color: syncStatus === 'synced' ? '#34C759' : '#FF9500', marginBottom: '8px' }}>
                                        {syncStatus === 'synced' ? 'Connected' : syncStatus === 'offline' ? 'Disconnected - using local data' : 'Connecting...'}
                                    </div>
                                    <button className="modal-btn modal-btn-secondary" style={{ flex: 'none', marginBottom: '12px' }} onClick={() => { setShowSettingsModal(false); loadFromBackend(); }}>Refresh from Backend</button>
                                </div>
                                <div style={{ fontSize: '12px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '12px', color: '#1D1D1F' }}>Google Sheets CSV (Optional)</div>
                                {LOCATIONS.map(loc => (
                                    <div key={loc} className="settings-group">
                                        <div className="settings-group-title">{loc}</div>
                                        <input type="text" className="settings-group-input" placeholder="Paste CSV export URL..." value={googleSheetUrls[loc] || ''} onChange={(e) => setGoogleSheetUrls({ ...googleSheetUrls, [loc]: e.target.value })} />
                                        <div className="settings-note">File &gt; Share &gt; Publish to web (as CSV)</div>
                                    </div>
                                ))}
                                <div className="modal-buttons">
                                    <button className="modal-btn modal-btn-primary" onClick={() => setShowSettingsModal(false)}>Done</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ADD LINE ITEM MODAL */}
                    {showAddModal && (
                        <div className="modal-overlay" onClick={() => setShowAddModal(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-title">Add Line Item</div>
                                <AddLineItemForm onAdd={addLineItem} onCancel={() => setShowAddModal(false)} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function AddLineItemForm({ onAdd, onCancel }) {
            const [form, setForm] = useState({
                vendor: '', publisher: '', campaign: '', media: 'DIGITAL', category: 'PROSPECT', status: 'Active'
            });

            return (
                <>
                    <div className="form-group">
                        <label className="form-label">Vendor</label>
                        <input type="text" className="form-input" value={form.vendor} onChange={(e) => setForm({ ...form, vendor: e.target.value })} />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Publisher</label>
                        <input type="text" className="form-input" value={form.publisher} onChange={(e) => setForm({ ...form, publisher: e.target.value })} />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Campaign</label>
                        <input type="text" className="form-input" value={form.campaign} onChange={(e) => setForm({ ...form, campaign: e.target.value })} />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Media Type</label>
                        <select className="form-select" value={form.media} onChange={(e) => setForm({ ...form, media: e.target.value })}>
                            <option>DIGITAL</option><option>SOCIAL</option><option>PRINT</option><option>OOH</option>
                            <option>TECHNOLOGY</option><option>DIRECTORY</option><option>DIRECT MAIL</option><option>EVENTS</option><option>MERCH</option>
                        </select>
                    </div>
                    <div className="form-group">
                        <label className="form-label">Category</label>
                        <select className="form-select" value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
                            <option>PROSPECT</option><option>TECHNOLOGY</option><option>ROOFING</option><option>ALL</option>
                        </select>
                    </div>
                    <div className="form-group">
                        <label className="form-label">Status</label>
                        <select className="form-select" value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
                            <option>Active</option><option>Trial</option><option>Unapproved</option><option>Ended</option>
                        </select>
                    </div>
                    <div className="modal-buttons">
                        <button className="modal-btn modal-btn-primary" onClick={() => onAdd(form)}>Add Item</button>
                        <button className="modal-btn modal-btn-secondary" onClick={onCancel}>Cancel</button>
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BudgetDashboard />);
    </script>
</body>
</html>
